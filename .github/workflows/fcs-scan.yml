name: FCS Image Scan

on:
  push:
    branches: [main]
  pull_request:

env:
  FALCON_CLIENT_ID: ${{ secrets.FALCON_CLIENT_ID }}
  FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}
  FALCON_REGION: us-1
  FALCON_API_URL: https://api.crowdstrike.com

jobs:
  fcs-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t myapp:${{ github.sha }} .

      # Option A: Use the official CrowdStrike GitHub Action
      - name: FCS scan (official action)
        uses: CrowdStrike/fcs-action@v1
        with:
          falcon_client_id: ${{ secrets.FALCON_CLIENT_ID }}
          falcon_client_secret: ${{ secrets.FALCON_CLIENT_SECRET }}
          falcon_region: us-1
          image: myapp:${{ github.sha }}

